services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: bristol_food_network
      MYSQL_USER: django_user
      MYSQL_PASSWORD: django_pass
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
      - ./init_mysql.sh:/docker-entrypoint-initdb.d/init_mysql.sh
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "-uroot", "-proot_password", "ping" ]
      interval: 20s
      timeout: 5s
      retries: 30

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    user: root
    depends_on:
      db:
        condition: service_healthy



volumes:
  db_data: