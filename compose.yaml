   version: '3.8'

   services:
     db:
       image: mysql:8.0
       environment:
         MYSQL_DATABASE: bristol_food_network
         MYSQL_USER: django_user
         MYSQL_PASSWORD: django_pass
         MYSQL_ROOT_PASSWORD: root_password
       volumes:
         - db_data:/var/lib/mysql
       healthcheck:
         test: [ "CMD", "mysqladmin", "-uroot", "-proot_password", "ping" ]
         interval: 10s
         timeout: 5s
         retries: 10

     web:
       build: .
       command: python manage.py runserver 0.0.0.0:8000
       volumes:
         - .:/code
       ports:
         - "8000:8000"
       depends_on:
         db:
           condition: service_healthy

   volumes:
     db_data: