{% extends "base.html" %}

{% block content %}
    <div class="mb-3">
        <h2 style="color: white">Add New Product</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Add Product</button>
        </form>
    </div>
{% endblock %}
