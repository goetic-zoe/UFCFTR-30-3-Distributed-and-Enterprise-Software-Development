<!-- templates/registration/register.html -->
{% extends "base.html" %}

{% block content %}
    <style>
        li{
            color: black;
        }
        p{
            color: black;
        }
    </style>

    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-body">
                    <h2>Register</h2>
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit">Register</button>
                    </form>
                    <a href="{% url 'login' %}">Already have an account? Log in here.</a>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
